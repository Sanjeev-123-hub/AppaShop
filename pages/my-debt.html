<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>என் Debt — Appa Kadai</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root{ --green:#2e7d32;--gl:#43a047;--gbg:#e8f5e9;--orange:#e65100;--red:#c62828;--sub:#64748b;--border:#e2e8f0; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6f8;color:#1a1a1a}

.page-header{display:flex;align-items:center;gap:10px;padding:16px;font-size:1.1rem;font-weight:700}
.page-header a{color:#555;text-decoration:none}

/* Hero balance */
.balance-hero{
  margin:0 16px 20px;border-radius:18px;padding:26px 20px;color:#fff;
  background:linear-gradient(135deg,#b71c1c 0%,#e53935 100%);
  box-shadow:0 6px 28px rgba(183,28,28,.38);
  transition:background .5s;
}
.balance-hero.clear{
  background:linear-gradient(135deg,#1b5e20 0%,#43a047 100%);
  box-shadow:0 6px 28px rgba(27,94,32,.38);
}
.bh-label{font-size:.8rem;opacity:.82;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.bh-amount{font-size:2.6rem;font-weight:900;letter-spacing:-1.5px;line-height:1}
.bh-sub{font-size:.82rem;opacity:.72;margin-top:8px}
.bh-badges{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.bh-chip{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:.78rem;font-weight:600}

/* Summary row */
.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 16px 20px}
.summary-card{background:#fff;border-radius:12px;padding:14px 12px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.sc-val{font-size:1.25rem;font-weight:800;line-height:1}
.sc-lbl{font-size:.72rem;color:var(--sub);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}

/* Debt entry card */
.debt-entry{
  background:#fff;border-radius:14px;margin:0 16px 14px;
  padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.07);
  border-left:4px solid var(--orange);
}
.debt-entry.paid{border-left-color:var(--gl);opacity:.88}
.de-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.de-title{font-weight:700;font-size:.97rem;color:#1a1a1a}
.de-date{font-size:.74rem;color:var(--sub);margin-top:3px}
.de-amount{font-size:1.3rem;font-weight:900;color:var(--red);line-height:1}
.de-amount.paid{color:var(--gl)}
.de-of{font-size:.7rem;color:var(--sub);text-align:right;margin-top:2px}
.de-note{font-size:.82rem;color:var(--sub);background:#f8fafc;border-radius:8px;padding:8px 11px;margin:10px 0}

/* Progress */
.progress-bar{height:7px;background:#f0f0f0;border-radius:10px;overflow:hidden;margin:8px 0 4px}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gl),#a5d6a7);transition:width .6s ease}
.progress-labels{display:flex;justify-content:space-between;font-size:.73rem;color:var(--sub)}

/* Payment history */
.pay-history{margin-top:12px;padding-top:12px;border-top:1px solid #f3f3f3}
.pay-history-title{font-size:.7rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.pay-row{display:flex;justify-content:space-between;font-size:.82rem;padding:4px 0;border-bottom:1px dashed #f0f0f0}
.pay-row:last-child{border-bottom:none}
.pay-row .amt{color:var(--gl);font-weight:700}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:700;text-transform:uppercase}
.b-pending{background:#fff3e0;color:#e65100}
.b-partial{background:#f3e5f5;color:#6a1b9a}
.b-paid   {background:#e8f5e9;color:#2e7d32}

.empty-state{text-align:center;padding:60px 20px;color:#aaa}
.empty-state i{font-size:3rem;display:block;margin-bottom:14px;opacity:.3}
.empty-state h3{color:#555;font-size:1rem;margin-bottom:6px}
.empty-state p{font-size:.85rem}

.spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:var(--gl);border-radius:50%;animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}

.contact-note{margin:0 16px 100px;background:#fff;border-radius:14px;padding:16px;text-align:center;color:#888;font-size:.85rem;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.contact-note i{font-size:1.5rem;color:#bbb;display:block;margin-bottom:6px}

.toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:10px;font-size:.87rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.15);opacity:0;transform:translateX(10px);transition:all .3s}
.toast.show{opacity:1;transform:translateX(0)}
.toast-success{background:#e8f5e9;color:#1b5e20;border-left:4px solid #43a047}
.toast-error  {background:#ffebee;color:#c62828;border-left:4px solid #ef5350}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<nav class="navbar">
  <div class="navbar-brand">🛒 <span>Appa</span> Kadai</div>
</nav>

<div class="page-header">
  <a href="profile.html"><i class="fas fa-arrow-left"></i></a>
  என் Debt நிலை 💳
</div>

<div id="loadingWrap"><div class="spinner"></div></div>

<div id="debtContent" style="display:none">

  <!-- Balance hero -->
  <div class="balance-hero" id="balanceHero">
    <div class="bh-label">மொத்த நிலுவை தொகை</div>
    <div class="bh-amount" id="totalBalance">₹0</div>
    <div class="bh-sub" id="balanceSub">Loading…</div>
    <div class="bh-badges" id="statusBadges"></div>
  </div>

  <!-- Summary strip -->
  <div class="summary-strip">
    <div class="summary-card">
      <div class="sc-val" id="sumTotal">0</div>
      <div class="sc-lbl">Total Entries</div>
    </div>
    <div class="summary-card">
      <div class="sc-val" style="color:#e65100" id="sumPending">0</div>
      <div class="sc-lbl">Pending</div>
    </div>
    <div class="summary-card">
      <div class="sc-val" style="color:#43a047" id="sumPaid">0</div>
      <div class="sc-lbl">Cleared</div>
    </div>
  </div>

  <!-- Debt entries -->
  <div id="debtList"></div>

  <!-- Contact note -->
  <div class="contact-note">
    <i class="fas fa-store"></i>
    ஏதாவது சந்தேகம் இருந்தால் <strong>Appa Kadai</strong>-ஐ தொடர்பு கொள்ளுங்கள்.<br>
    <span style="margin-top:6px;display:inline-block">Payment செய்த பிறகு admin-கிட்ட சொல்லுங்கள் — அவர் update செய்வார்.</span>
  </div>
</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <a href="../index.html"><i class="fas fa-home"></i> Home</a>
  <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a>
  <a href="order.html"><i class="fas fa-receipt"></i> Orders</a>
  <a href="profile.html" class="active"><i class="fas fa-user"></i> Profile</a>
</nav>

<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script>
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = "login.html"; return; }

  try {
    const snap = await db.collection("debts")
      .where("userEmail", "==", user.email)
      .orderBy("createdAt", "desc")
      .get();
    const debts = snap.docs.map(d => ({ id:d.id, ...d.data() }));

    document.getElementById("loadingWrap").style.display = "none";
    document.getElementById("debtContent").style.display = "block";
    renderPage(debts);
  } catch(e) {
    console.error(e);
    document.getElementById("loadingWrap").innerHTML =
      `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Load aagalai</h3><p>Internet check pannunga</p></div>`;
  }
});

function renderPage(debts) {
  const pending  = debts.filter(d => d.status !== "paid");
  const cleared  = debts.filter(d => d.status === "paid");
  const totalOwed= pending.reduce((s,d) => s + (d.remaining ?? d.amount ?? 0), 0);

  // Hero
  const hero = document.getElementById("balanceHero");
  document.getElementById("totalBalance").textContent = "₹" + totalOwed.toLocaleString("en-IN");
  if (totalOwed === 0) {
    hero.classList.add("clear");
    document.getElementById("balanceSub").textContent = "அனைத்தும் settle ஆகிவிட்டது! நன்றி 🎉";
  } else {
    document.getElementById("balanceSub").textContent =
      `${pending.length} நிலுவை entry — admin-கிட்ட பணம் கட்டுங்கள்`;
  }

  // Status badges in hero
  const badge = s => `<span style="background:rgba(255,255,255,.22);border-radius:20px;padding:4px 12px;font-size:.76rem;font-weight:600">${s}</span>`;
  document.getElementById("statusBadges").innerHTML = [
    pending.filter(d=>d.status==="pending").length  ? badge(`${pending.filter(d=>d.status==="pending").length} Pending`) : "",
    pending.filter(d=>d.status==="partial").length  ? badge(`${pending.filter(d=>d.status==="partial").length} Partial`) : "",
    cleared.length                                   ? badge(`${cleared.length} Cleared ✅`) : "",
  ].filter(Boolean).join("");

  // Summary strip
  document.getElementById("sumTotal").textContent   = debts.length;
  document.getElementById("sumPending").textContent = pending.length;
  document.getElementById("sumPaid").textContent    = cleared.length;

  if (!debts.length) {
    document.getElementById("debtList").innerHTML = `
      <div class="empty-state">
        <i class="fas fa-smile"></i>
        <h3>Debt இல்லை!</h3>
        <p>உங்கள் account-ல் எந்த debt-உம் பதிவு செய்யப்படவில்லை.</p>
      </div>`;
    return;
  }

  document.getElementById("debtList").innerHTML = debts.map(d => {
    const remaining = d.remaining ?? d.amount ?? 0;
    const paidAmt   = (d.amount ?? 0) - remaining;
    const pct       = d.amount > 0 ? Math.round((paidAmt / d.amount) * 100) : 0;
    const isPaid    = d.status === "paid";
    const date      = d.createdAt?.toDate
      ? d.createdAt.toDate().toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})
      : "—";

    const history = (d.payments||[]).slice().reverse().map(p => {
      const pd = p.date ? new Date(p.date).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"}) : "—";
      return `<div class="pay-row">
        <span>✅ ${pd} — ${p.note||"Payment"}</span>
        <span class="amt">−₹${(p.amount||0).toFixed(2)}</span>
      </div>`;
    }).join("");

    return `
    <div class="debt-entry ${isPaid?"paid":""}">
      <div class="de-head">
        <div>
          <div class="de-title">${d.note || "Credit Purchase"}</div>
          <div class="de-date">சேர்க்கப்பட்டது: ${date}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px">
          <div class="de-amount ${isPaid?"paid":""}">₹${remaining.toLocaleString("en-IN")}</div>
          <div class="de-of">of ₹${(d.amount||0).toLocaleString("en-IN")}</div>
          <span class="badge b-${d.status}" style="margin-top:5px">${d.status}</span>
        </div>
      </div>

      <!-- Progress -->
      ${d.amount > 0 ? `
      <div class="progress-labels">
        <span>செலுத்தியது: ₹${paidAmt.toFixed(2)}</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ` : ""}

      <!-- Payment history -->
      ${history ? `
      <div class="pay-history">
        <div class="pay-history-title">Payment History</div>
        ${history}
      </div>` : ""}

      <!-- Paid stamp -->
      ${isPaid ? `<div style="margin-top:10px;color:var(--gl);font-weight:700;font-size:.9rem">✅ Fully settled — நன்றி!</div>` : ""}
    </div>`;
  }).join("");
}
</script>
</body>
</html>
